<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>لوحة الأدمن</title>

  <link rel="stylesheet" href="css/admin.css" />
</head>

<body>

  <!-- Navbar -->
  <header class="navbar">

    <div class="logo">
      🍰 لوحة الأدمن
    </div>

    <nav>
      <a href="index.html">الرئيسية</a>
      <a href="admin.html">لوحة الأدمن</a>
    </nav>

  </header>

  <!-- Admin -->
  <section class="admin-section">

    <!-- ========================= -->
    <!-- إضافة كيكة -->
    <!-- ========================= -->

    <div class="admin-box">

      <h2>إضافة كيكة جديدة 🍰</h2>

      <form id="cakeForm" class="cake-form">

        <input
          type="text"
          id="cakeName"
          placeholder="اسم الكيكة"
          required
        />

        <input
          type="number"
          id="cakePrice"
          placeholder="السعر"
          required
        />

        <input
          type="file"
          id="cakeImage"
          accept="image/*"
          required
        />

        <textarea
          id="cakeDescription"
          placeholder="وصف الكيكة"
        ></textarea>

        <select id="cakeCategory">

          <option value="Chocolate">
            Chocolate
          </option>

          <option value="Vanilla">
            Vanilla
          </option>

          <option value="Birthday">
            Birthday
          </option>

          <option value="Wedding">
            Wedding
          </option>

        </select>

        <button type="submit">
          إضافة الكيكة
        </button>

      </form>

    </div>

    <!-- ========================= -->
    <!-- الكيكات -->
    <!-- ========================= -->

    <div class="admin-box">

      <h2>الكيكات المضافة 🎂</h2>

      <div
        id="cakesContainer"
        class="cakes-admin-container"
      ></div>

    </div>

    <!-- ========================= -->
    <!-- الطلبات -->
    <!-- ========================= -->

    <div class="admin-box">

      <h2>الطلبات 🧾</h2>

      <div
        id="ordersContainer"
        class="orders-container"
      ></div>

    </div>


    <div class="ordered-cake-info">

  <img
    src="${order.cakeImage}"
    class="ordered-cake-img"
  >

  <div>

    <h3>
      🍰 ${order.cakeName || order.cakeType}
    </h3>

    <p>
      💰 السعر:
      ${order.cakePrice || "-"} $
    </p>

    <p>
      📂 التصنيف:
      ${order.cakeCategory || "-"}
    </p>

  </div>

</div>
  </section>

  <!-- حماية الأدمن -->
  <script>

    if (localStorage.getItem("isAdmin") !== "true") {

      alert("❌ غير مسموح بالدخول");

      window.location.href = "index.html";

    }

  </script>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <script src="js/firebase.js"></script>

  <!-- Admin JS -->
  <script src="js/admin.js"></script>

</body>
</html>
