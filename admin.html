<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>لوحة الأدمن</title>

  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

  <!-- Navbar -->
  <header class="navbar">

    <div class="logo">
      🍰 Admin Dashboard
    </div>

    <nav>
      <a href="index.html">الرئيسية</a>
      <a href="admin.html">لوحة الأدمن</a>
    </nav>

  </header>

  <!-- Admin Section -->
  <section class="admin-section">

    <h1>إدارة الطلبات 🎂</h1>

    <!-- Orders Container -->
    <div id="ordersContainer" class="orders-container">

      <!-- الطلبات تظهر هنا -->

      <!-- مثال Card -->

      <div class="order-card">

        <h3>رقم الطلب: CK1023</h3>

        <p><strong>الاسم:</strong> أحمد</p>

        <p><strong>الهاتف:</strong> 123456789</p>

        <p><strong>نوع الكيك:</strong> Chocolate</p>

        <p><strong>الحجم:</strong> Large</p>

        <p><strong>النكهة:</strong> Vanilla</p>

        <p><strong>تاريخ التسليم:</strong> 2026-05-20</p>

        <p>
          <strong>الحالة:</strong>

          <span class="status pending">
            قيد التنفيذ
          </span>
        </p>

        <!-- Status Select -->
        <select class="status-select">

          <option value="Pending">
            قيد التنفيذ
          </option>

          <option value="Preparing">
            جاري التحضير
          </option>

          <option value="Completed">
            تم الانتهاء
          </option>

          <option value="Delivered">
            تم التوصيل
          </option>

        </select>

        <!-- Buttons -->
        <div class="card-buttons">

          <button class="update-btn">
            تحديث الحالة
          </button>

          <button class="delete-btn">
            حذف الطلب
          </button>

        </div>

      </div>

    </div>

  </section>
  <script>
if (localStorage.getItem("isAdmin") !== "true") {
  alert("❌ غير مسموح بالدخول");
  window.location.href = "index.html";
}
</script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script src="js/firebase.js"></script>
  <script src="js/admin.js"></script>

</body>
</html>
