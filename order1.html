<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    طلب الكيكة
  </title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{

      background:
      linear-gradient(
        135deg,
        #fff0f5,
        #ffe4ec
      );

      min-height:100vh;

      padding:20px;

      direction:rtl;

    }

    .container{

      max-width:500px;

      margin:auto;

    }

    /* ========================= */
    /* CARD */
    /* ========================= */

    .card{

      background:white;

      border-radius:25px;

      padding:25px;

      box-shadow:
      0 10px 30px rgba(0,0,0,0.08);

      margin-bottom:25px;

      animation:fadeUp 0.5s ease;

    }

    /* ========================= */
    /* TITLES */
    /* ========================= */

    h2{

      text-align:center;

      margin-bottom:20px;

      color:#ff4f81;

      font-size:32px;

    }

    h3{

      margin-bottom:15px;

      color:#333;

      font-size:22px;

    }

    /* ========================= */
    /* CAKE INFO */
    /* ========================= */

    #cakeInfo{

      display:flex;

      flex-direction:column;

      gap:15px;

      text-align:center;

    }

    #cakeInfo img{

      width:100%;

      height:280px;

      object-fit:cover;

      border-radius:20px;

      box-shadow:
      0 5px 20px rgba(0,0,0,0.1);

    }

    #cakeInfo h3{

      color:#ff4f81;

      margin-top:10px;

    }

    #cakeInfo p{

      color:#555;

      line-height:1.8;

      word-break:break-word;

    }

    /* ========================= */
    /* FORM */
    /* ========================= */

    form{

      display:flex;

      flex-direction:column;

      gap:15px;

    }

    input,
    textarea{

      width:100%;

      padding:16px;

      border:none;

      border-radius:14px;

      background:#f5f5f5;

      font-size:16px;

      outline:none;

      transition:0.3s;

    }

    input:focus,
    textarea:focus{

      background:white;

      box-shadow:
      0 0 0 3px rgba(255,79,129,0.2);

    }

    textarea{

      resize:none;

      min-height:120px;

    }

    /* ========================= */
    /* BUTTONS */
    /* ========================= */

    button{

      border:none;

      background:#ff4f81;

      color:white;

      padding:16px;

      border-radius:14px;

      font-size:18px;

      font-weight:bold;

      cursor:pointer;

      transition:0.3s;

    }

    button:hover{

      background:#e63d70;

      transform:translateY(-2px);

    }

    /* ========================= */
    /* ORDER CODE */
    /* ========================= */

    .code-section{

      text-align:center;

    }

    #orderCodeBox{

      margin-top:15px;

      background:#fff0f5;

      padding:18px;

      border-radius:14px;

      font-size:20px;

      color:#ff4f81;

      font-weight:bold;

      word-break:break-word;

    }

    #copyCode{

      margin-top:15px;

      width:100%;

      background:#111827;

    }

    #copyCode:hover{

      background:#222;

    }

    /* ========================= */
    /* ANIMATION */
    /* ========================= */

    @keyframes fadeUp{

      from{

        opacity:0;
        transform:translateY(20px);

      }

      to{

        opacity:1;
        transform:translateY(0);

      }

    }

    /* ========================= */
    /* MOBILE */
    /* ========================= */

    @media(max-width:480px){

      body{

        padding:15px;

      }

      .card{

        padding:20px;

        border-radius:20px;

      }

      h2{

        font-size:28px;

      }

      h3{

        font-size:20px;

      }

      #cakeInfo img{

        height:230px;

      }

      input,
      textarea,
      button{

        font-size:15px;

      }

    }

  </style>

</head>

<body>

  <div class="container">

    <!-- ========================= -->
    <!-- CAKE INFO -->
    <!-- ========================= -->

    <div class="card">

      <h2>
        🎂 تفاصيل الكيكة
      </h2>

      <div id="cakeInfo"></div>

    </div>

    <!-- ========================= -->
    <!-- ORDER FORM -->
    <!-- ========================= -->

    <div class="card">

      <h3>
        🧾 بيانات الطلب
      </h3>

      <form id="orderForm">

        <input
          id="name"
          placeholder="الاسم"
          required
        >

        <input
          id="phone"
          placeholder="رقم الهاتف"
          required
        >

        <input
          id="address"
          placeholder="العنوان"
          required
        >

        <textarea
          id="notes"
          placeholder="ملاحظات الطلب"
        ></textarea>

        <button type="submit">
          🚀 إرسال الطلب
        </button>

      </form>

    </div>

    <!-- ========================= -->
    <!-- ORDER CODE -->
    <!-- ========================= -->

    <div class="card code-section">

      <h3>
        🔑 كود الطلب
      </h3>

      <div id="orderCodeBox">

        لم يتم إنشاء كود بعد

      </div>

      <button id="copyCode">

        📋 نسخ الكود

      </button>

    </div>

  </div>

  <!-- Firebase -->

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <script src="js/firebase.js"></script>

  <!-- JS -->

  <script src="js/order1.js"></script>

</body>

</html>
