<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">

<body>

  <!-- Navbar -->
  <header class="navbar">

    <div class="logo">
      🍰 Sweet Cake
    </div>

    <nav>
      <a href="index.html">الرئيسية</a>
      <a href="order.html">اطلب الآن</a>

  <!-- Track Section -->
  <section class="track-section">

    <h1>تتبع طلب الكيك 🎂</h1>

    <div class="track-box">

      <input
        type="text"
        id="trackInput"
        placeholder="أدخل رقم الطلب"
      >

      <button id="trackBtn">
        تتبع الطلب
      </button>

    </div>

    <!-- Result -->
    <div id="trackResult" class="track-result">

      <!-- تظهر بيانات الطلب هنا -->

    </div>

  </section>

  <script src="js/track.js"></script>
